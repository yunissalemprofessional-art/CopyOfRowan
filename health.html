<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Daily Stack — Customizable Template</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);
  --bg-secondary: rgba(255, 255, 255, 0.035);
  --bg-input: rgba(0, 0, 0, 0.28);
  --bg-input-focus: rgba(0, 0, 0, 0.36);
  --bg-dropdown: rgba(15, 15, 18, 0.96);

  --border: rgba(255, 255, 255, 0.06);
  --border-soft: rgba(255, 255, 255, 0.04);
  --border-strong: rgba(255, 255, 255, 0.12);

  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;

  --accent: #1D9E75;
  --accent-glow: rgba(29, 158, 117, 0.35);
  --warning: #FF8A4D;
  --warning-bg: rgba(163, 45, 45, 0.10);
  --tag-stack: #D8AB30;
  --tag-stack-bg: rgba(216, 171, 48, 0.15);

  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; }

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(60% 50% at 82% 14%, rgba(224, 118, 88, 0.16) 0%, transparent 60%),
    radial-gradient(50% 40% at 18% 90%, rgba(180, 180, 200, 0.06) 0%, transparent 60%);
  filter: blur(40px);
  pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(-2%, 2%); } }

main {
  position: relative; z-index: 2;
  max-width: 720px; margin: 0 auto;
  padding: 56px 20px 80px;
  padding-top: max(56px, env(safe-area-inset-top, 56px));
}

.section-title {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin: 0 4px 14px;
  display: flex; align-items: center; gap: 12px;
}
.section-title::before { content: '≡'; font-size: 14px; opacity: 0.5; }

.water-embed { margin-top: 56px; }
.water-iframe {
  display: block;
  width: 100%;
  height: 880px;
  border: 0;
  background: transparent;
  border-radius: 16px;
  overflow: hidden;
  color-scheme: dark;
}
@media (max-width: 480px) {
  .water-embed { margin-top: 40px; }
  .water-iframe { height: 780px; }
}

.stack-card {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 22px 22px 18px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
}

.stack-head { margin-bottom: 14px; }
.sf-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}
.sf-title {
  font-size: 24px; font-weight: 700;
  letter-spacing: -0.022em;
  color: var(--text-primary);
  line-height: 1.15; margin-bottom: 2px;
}

.stack-item {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 10px;
  align-items: center;
  padding: 10px 12px;
  border-radius: 10px;
  background: var(--bg-secondary);
  border: 1px solid transparent;
  transition: background 0.2s, border-color 0.2s;
}
.stack-item:hover { background: rgba(255,255,255,0.05); }
.stack-item.taken { background: rgba(29,158,117,0.08); }
.stack-item.taken .stack-item-name { text-decoration: line-through; color: var(--text-tertiary); }

.stack-check {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border-strong);
  background: var(--bg-card);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: transparent;
  transition: all 0.2s;
  flex-shrink: 0; font-family: inherit; padding: 0;
}
.stack-check:hover { border-color: var(--accent); }
.stack-check.checked {
  background: var(--accent); border-color: var(--accent);
  color: white;
  box-shadow: 0 0 12px var(--accent-glow);
}

.stack-item-body { min-width: 0; }
.stack-item-name {
  font-size: 14px; font-weight: 600;
  color: var(--text-primary);
  line-height: 1.2;
}

/* ----- Sleep: streak pill (same pattern as the Main tab's goal streak) ----- */
.sleep-streak-row { display: flex; margin-bottom: 16px; }
.sleep-streak {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-strong);
  color: var(--text-tertiary);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.10em; text-transform: uppercase;
  transition: background 0.25s, color 0.25s, border-color 0.25s;
}
.sleep-streak-icon { font-size: 13px; }
.sleep-streak-num {
  font-family: var(--font-mono);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.sleep-streak.sleep-streak-active {
  background: rgba(242,192,99,0.10);
  color: #F2C063;
  border-color: rgba(242,192,99,0.32);
}
.sleep-streak.sleep-streak-active .sleep-streak-icon {
  filter: drop-shadow(0 0 6px rgba(242,192,99,0.6));
}

/* ----- Sleep: bedtime / wake inputs ----- */
.sleep-fields {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 12px;
}
.sleep-field { display: flex; flex-direction: column; gap: 6px; }
.sleep-field label {
  font-size: 10.5px; color: var(--text-tertiary); font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
}
.sleep-target {
  font-size: 9.5px; color: var(--text-quaternary); font-weight: 500;
  letter-spacing: 0; text-transform: none;
}
.sleep-field input[type="time"] {
  padding: 12px; border-radius: 10px;
  border: 1px solid var(--border-strong);
  background: var(--bg-input);
  color: var(--text-primary);
  font-family: var(--font-mono); font-size: 16px; font-weight: 600;
  color-scheme: dark;
}
.sleep-field input[type="time"]:focus {
  outline: none; border-color: rgba(255,255,255,0.40);
  background: var(--bg-input-focus);
}
.sleep-save-btn {
  width: 100%; padding: 11px; margin-bottom: 4px;
  border-radius: 10px; border: 1px solid rgba(255,255,255,0.85);
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
}
.sleep-save-btn:active { transform: scale(0.98); }
.sleep-saved-note {
  font-size: 11px; color: var(--accent); text-align: center;
  min-height: 16px; margin-bottom: 4px;
}

/* ----- Sleep: rolling 7-day history (same pattern as the Water tracker) ----- */
.sleep-hist { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border-soft); }
.sleep-hist-title {
  font-size: 10.5px; color: var(--text-tertiary); font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px;
}
.sleep-hist-row {
  display: grid; grid-template-columns: 60px 1fr auto; gap: 10px;
  padding: 9px 0; align-items: center;
  border-bottom: 1px solid var(--border-soft);
  font-size: 13px;
}
.sleep-hist-row:last-child { border-bottom: none; }
.sleep-hist-date { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
.sleep-hist-bar-wrap {
  height: 8px; background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden;
}
.sleep-hist-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), #6BE3A4);
  border-radius: 4px;
}
.sleep-hist-bar-fill.miss { background: rgba(255,138,138,0.4); }
.sleep-hist-count {
  font-family: var(--font-mono); font-size: 11.5px;
  color: var(--text-secondary); font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

/* ----- Nutrition ----- */
.nutri-totals { display: flex; flex-direction: column; gap: 12px; margin-bottom: 4px; }
.nutri-stat-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 6px; font-size: 12px;
}
.nutri-stat-label {
  color: var(--text-tertiary); font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; font-size: 10.5px;
}
.nutri-stat-val {
  font-family: var(--font-mono); color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
  display: flex; align-items: center; gap: 4px;
}
.nutri-stat-val input[type="number"] {
  width: 54px; padding: 3px 6px; text-align: center;
  border-radius: 6px; border: 1px solid var(--border-strong);
  background: var(--bg-input); color: var(--text-primary);
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
}
.nutri-stat-bar-wrap {
  height: 6px; background: rgba(255,255,255,0.04);
  border-radius: 3px; overflow: hidden;
}
.nutri-stat-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), #6BE3A4);
  border-radius: 3px; transition: width 0.3s;
}

.nutri-add-row {
  display: flex; flex-direction: column; gap: 8px;
  margin: 16px 0 12px; padding-top: 14px;
  border-top: 1px solid var(--border-soft);
}
.nutri-add-row input {
  padding: 10px 12px; border-radius: 8px;
  border: 1px solid var(--border-strong);
  background: var(--bg-input); color: var(--text-primary);
  font-family: inherit; font-size: 13px;
}
.nutri-add-row input:focus {
  outline: none; border-color: rgba(255,255,255,0.40);
  background: var(--bg-input-focus);
}
.nutri-input-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.nutri-input-grid input { text-align: center; }
.nutri-add-btn {
  padding: 11px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.85);
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
}
.nutri-add-btn:active { transform: scale(0.98); }

.nutri-meal-list { display: flex; flex-direction: column; gap: 6px; }
.nutri-meal-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 10px;
  background: var(--bg-secondary);
  font-size: 13px;
}
.nutri-meal-name {
  flex: 1; min-width: 0; color: var(--text-primary); font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.nutri-meal-macros {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-tertiary); white-space: nowrap;
}
.nutri-meal-del {
  background: transparent; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 16px; padding: 2px 6px; line-height: 1;
}
.nutri-meal-del:hover { color: #FF6B6B; }
.nutri-empty {
  text-align: center; font-size: 12px; font-style: italic;
  color: var(--text-tertiary); padding: 10px 0;
}

.attribution {
  text-align: center; margin-top: 28px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-quaternary);
}

@media (max-width: 600px) {
  main { padding: 40px 16px 60px; }
  .stack-card { padding: 18px 16px 14px; }
}

::selection { background: rgba(224, 118, 88, 0.3); color: var(--text-primary); }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }
</style>
</head>
<body>

<main>
  <div class="section-title">Daily Stack</div>

  <div class="stack-card">
    <div class="stack-head">
      <div class="sf-eyebrow">Supplements</div>
      <div class="sf-title">Daily reminder</div>
    </div>

    <div class="stack-item" id="stackItem">
      <button class="stack-check" id="stackCheck" aria-label="Mark supplements taken"></button>
      <div class="stack-item-body">
        <div class="stack-item-name" id="stackLabel">Took my supplements today</div>
      </div>
    </div>
  </div>

  <div class="section-title" style="margin-top:32px">Sleep</div>
  <div class="stack-card">
    <div class="stack-head">
      <div class="sf-eyebrow">Sleep</div>
      <div class="sf-title">Bedtime &amp; wake</div>
    </div>

    <div class="sleep-streak-row">
      <div class="sleep-streak" id="sleepStreak">
        <span class="sleep-streak-icon">⚡</span>
        <span class="sleep-streak-num" id="sleepStreakNum">0</span>
        <span>day streak</span>
      </div>
    </div>

    <div class="sleep-fields">
      <div class="sleep-field">
        <label>Bedtime <span class="sleep-target">target 10:30p</span></label>
        <input type="time" id="bedtimeInput">
      </div>
      <div class="sleep-field">
        <label>Wake <span class="sleep-target">target 6:00a</span></label>
        <input type="time" id="wakeInput">
      </div>
    </div>
    <button type="button" class="sleep-save-btn" id="sleepSaveBtn">Save</button>
    <div class="sleep-saved-note" id="sleepSavedNote"></div>

    <div class="sleep-hist">
      <div class="sleep-hist-title">Last 7 days</div>
      <div id="sleepHistory"></div>
    </div>
  </div>

  <div class="section-title" style="margin-top:32px">Nutrition</div>
  <div class="stack-card">
    <div class="stack-head">
      <div class="sf-eyebrow">Nutrition</div>
      <div class="sf-title">Today's meals</div>
    </div>

    <div class="nutri-totals">
      <div>
        <div class="nutri-stat-head">
          <span class="nutri-stat-label">Calories</span>
          <span class="nutri-stat-val"><span id="nutri_calories_val">0</span> / <input type="number" id="nutri_calories_target"></span>
        </div>
        <div class="nutri-stat-bar-wrap"><div class="nutri-stat-bar-fill" id="nutri_calories_bar" style="width:0%"></div></div>
      </div>
      <div>
        <div class="nutri-stat-head">
          <span class="nutri-stat-label">Protein (g)</span>
          <span class="nutri-stat-val"><span id="nutri_protein_val">0</span> / <input type="number" id="nutri_protein_target"></span>
        </div>
        <div class="nutri-stat-bar-wrap"><div class="nutri-stat-bar-fill" id="nutri_protein_bar" style="width:0%"></div></div>
      </div>
      <div>
        <div class="nutri-stat-head">
          <span class="nutri-stat-label">Carbs (g)</span>
          <span class="nutri-stat-val"><span id="nutri_carbs_val">0</span> / <input type="number" id="nutri_carbs_target"></span>
        </div>
        <div class="nutri-stat-bar-wrap"><div class="nutri-stat-bar-fill" id="nutri_carbs_bar" style="width:0%"></div></div>
      </div>
      <div>
        <div class="nutri-stat-head">
          <span class="nutri-stat-label">Fat (g)</span>
          <span class="nutri-stat-val"><span id="nutri_fat_val">0</span> / <input type="number" id="nutri_fat_target"></span>
        </div>
        <div class="nutri-stat-bar-wrap"><div class="nutri-stat-bar-fill" id="nutri_fat_bar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="nutri-add-row">
      <input type="text" id="mealName" placeholder="Meal name">
      <div class="nutri-input-grid">
        <input type="number" id="mealCalories" placeholder="Cal">
        <input type="number" id="mealProtein" placeholder="Protein g">
        <input type="number" id="mealCarbs" placeholder="Carbs g">
        <input type="number" id="mealFat" placeholder="Fat g">
      </div>
      <button type="button" class="nutri-add-btn" id="mealAddBtn">+ Add Meal</button>
    </div>

    <div class="nutri-meal-list" id="mealList"></div>
    <div class="nutri-empty" id="nutriEmpty">No meals logged today.</div>
  </div>

  <section id="water" class="water-embed">
    <div class="section-title">Water Tracker</div>
    <iframe src="po-water.html" class="water-iframe" loading="lazy" title="Water Tracker"></iframe>
  </section>

  <div class="attribution">// editable template · all data stays in your browser</div>
</main>

<script>
(() => {
  'use strict';

  const storeGet = (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };
  const storeSet = (k, v) => localStorage.setItem(k, JSON.stringify(v));

  function getActiveDate() {
    const now = new Date();
    if (now.getHours() < 6) now.setDate(now.getDate() - 1);
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  let todayKey = `stack:taken:${getActiveDate()}`;

  function isTaken() { return !!storeGet(todayKey); }
  function setTakenState(v) { storeSet(todayKey, v); }

  function render() {
    const taken = isTaken();
    const checkEl = document.getElementById('stackCheck');
    const itemEl = document.getElementById('stackItem');
    checkEl.classList.toggle('checked', taken);
    checkEl.textContent = taken ? '✓' : '';
    itemEl.classList.toggle('taken', taken);
  }

  document.getElementById('stackCheck').addEventListener('click', () => {
    setTakenState(!isTaken());
    render();
  });

  setInterval(() => {
    const newKey = `stack:taken:${getActiveDate()}`;
    if (newKey !== todayKey) todayKey = newKey;
    render();
  }, 60 * 1000);

  render();

  // ============================================================
  // SLEEP — bedtime/wake logged once per day (keyed like Stack, via
  // getActiveDate()'s 6am rollover), a day-streak for "in bed by
  // 10:30" (same pattern as the Main tab's goal streak), and a
  // rolling 7-day history list (same pattern as the Water tracker's
  // Last 7 Days list).
  // ============================================================
  const SLEEP_TARGET_BED  = '22:30';
  const SLEEP_TARGET_WAKE = '06:00';
  const SLEEP_WAKE_CUTOFF = '09:00';

  function storeListKeys(prefix) {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.indexOf(prefix) === 0) out.push(k);
    }
    return out;
  }
  function sleepKey(dateStr) { return 'sleep:' + dateStr; }
  function getSleep(dateStr) { return storeGet(sleepKey(dateStr)); }
  function setSleep(dateStr, data) { storeSet(sleepKey(dateStr), data); }

  function timeToMinutes(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    return h * 60 + m;
  }
  // Bedtimes logged as an early-morning hour (e.g. 00:30) are past
  // midnight — later than any evening bedtime — so normalize by
  // treating anything before noon as "next day" for comparison.
  function bedMinutesNormalized(hhmm) {
    let mins = timeToMinutes(hhmm);
    if (mins < 12 * 60) mins += 24 * 60;
    return mins;
  }
  function sleepDurationHours(bed, wake) {
    let diff = timeToMinutes(wake) - timeToMinutes(bed);
    if (diff <= 0) diff += 24 * 60;
    return diff / 60;
  }
  function fmtTime12(hhmm) {
    let [h, m] = hhmm.split(':').map(Number);
    const suffix = h >= 12 ? 'p' : 'a';
    h = h % 12; if (h === 0) h = 12;
    return h + ':' + String(m).padStart(2, '0') + suffix;
  }
  function inBedOnTime(bed) {
    return bedMinutesNormalized(bed) <= timeToMinutes(SLEEP_TARGET_BED);
  }

  function loadSleepStreak() {
    const s = storeGet('sleep_streak_v1');
    if (s && typeof s.count === 'number') return s;
    return { count: 0, lastProcessedDate: '' };
  }
  function saveSleepStreak(s) { storeSet('sleep_streak_v1', s); }
  function processSleepStreak() {
    const s = loadSleepStreak();
    const todayDateStr = getActiveDate();
    const keys = storeListKeys('sleep:')
      .map(k => k.slice('sleep:'.length))
      .filter(d => d < todayDateStr)
      .sort();
    keys.forEach(dateStr => {
      if (s.lastProcessedDate && dateStr <= s.lastProcessedDate) return;
      const entry = getSleep(dateStr);
      if (!entry || !entry.bed) { /* no log — don't break the streak */ }
      else if (inBedOnTime(entry.bed)) s.count += 1;
      else s.count = 0;
      s.lastProcessedDate = dateStr;
    });
    saveSleepStreak(s);
  }
  function renderSleepStreak() {
    const s = loadSleepStreak();
    document.getElementById('sleepStreakNum').textContent = s.count;
    document.getElementById('sleepStreak').classList.toggle('sleep-streak-active', s.count > 0);
  }

  function renderSleepHistory() {
    const wrap = document.getElementById('sleepHistory');
    const targetDuration = sleepDurationHours(SLEEP_TARGET_BED, SLEEP_TARGET_WAKE);
    const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const base = new Date();
    if (base.getHours() < 6) base.setDate(base.getDate() - 1);
    const rows = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(base);
      d.setDate(d.getDate() - i);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      rows.push({ date: d, key: `${y}-${m}-${dd}` });
    }
    wrap.innerHTML = rows.map(({ date, key }) => {
      const lbl = dows[date.getDay()] + ' ' + (date.getMonth() + 1) + '/' + date.getDate();
      const entry = getSleep(key);
      if (!entry || !entry.bed || !entry.wake) {
        return '<div class="sleep-hist-row">'
          + '<span class="sleep-hist-date">' + lbl + '</span>'
          + '<div class="sleep-hist-bar-wrap"><div class="sleep-hist-bar-fill miss" style="width:0%"></div></div>'
          + '<span class="sleep-hist-count">—</span>'
          + '</div>';
      }
      const dur = sleepDurationHours(entry.bed, entry.wake);
      const pct = Math.min(100, (dur / targetDuration) * 100);
      const cls = inBedOnTime(entry.bed) ? '' : 'miss';
      return '<div class="sleep-hist-row">'
        + '<span class="sleep-hist-date">' + lbl + '</span>'
        + '<div class="sleep-hist-bar-wrap"><div class="sleep-hist-bar-fill ' + cls + '" style="width:' + pct + '%"></div></div>'
        + '<span class="sleep-hist-count">' + fmtTime12(entry.bed) + '–' + fmtTime12(entry.wake) + '</span>'
        + '</div>';
    }).join('');
  }

  function renderSleep() {
    processSleepStreak();
    renderSleepStreak();
    renderSleepHistory();
  }

  (function initSleepInputs() {
    const today = getSleep(getActiveDate());
    if (today) {
      if (today.bed) document.getElementById('bedtimeInput').value = today.bed;
      if (today.wake) document.getElementById('wakeInput').value = today.wake;
    }
  })();

  document.getElementById('sleepSaveBtn').addEventListener('click', () => {
    const bed = document.getElementById('bedtimeInput').value;
    const wake = document.getElementById('wakeInput').value;
    if (!bed && !wake) return;
    setSleep(getActiveDate(), { bed: bed || null, wake: wake || null });
    const note = document.getElementById('sleepSavedNote');
    note.textContent = 'Saved';
    setTimeout(() => { note.textContent = ''; }, 1500);
    renderSleep();
  });

  renderSleep();

  // ============================================================
  // NUTRITION — manual meal entry, resets daily (same getActiveDate()
  // boundary as Stack/Sleep). Running totals shown against editable
  // daily targets, defaulting to Calories 3500 / Protein 260g /
  // Carbs 395g / Fat 97g.
  // ============================================================
  const NUTRI_DEFAULT_TARGETS = { calories: 3500, protein: 260, carbs: 395, fat: 97 };
  const NUTRI_MACROS = ['calories', 'protein', 'carbs', 'fat'];

  function nutriKey(dateStr) { return 'nutrition:' + dateStr; }
  function getMeals(dateStr) { return storeGet(nutriKey(dateStr)) || []; }
  function setMeals(dateStr, arr) { storeSet(nutriKey(dateStr), arr); }
  function getNutriTargets() {
    const t = storeGet('nutrition_targets_v1');
    return Object.assign({}, NUTRI_DEFAULT_TARGETS, (t && typeof t === 'object') ? t : {});
  }
  function setNutriTargets(t) { storeSet('nutrition_targets_v1', t); }
  function escapeHtmlNutri(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  // Totals/bars depend on meals + targets; the meal list DOM only
  // depends on meals. Keeping these separate means editing a target
  // number never rebuilds the meal list — rebuilding it on every
  // keystroke risked eating a delete-button click if its native
  // "change" (fired on blur, i.e. exactly when you click elsewhere)
  // landed mid-click and swapped the button out from under the cursor.
  function renderNutriTotals() {
    const dateStr = getActiveDate();
    const meals = getMeals(dateStr);
    const targets = getNutriTargets();
    const totals = meals.reduce((acc, m) => {
      NUTRI_MACROS.forEach(k => { acc[k] += Number(m[k]) || 0; });
      return acc;
    }, { calories: 0, protein: 0, carbs: 0, fat: 0 });

    NUTRI_MACROS.forEach((macro) => {
      document.getElementById('nutri_' + macro + '_val').textContent = totals[macro];
      const targetInput = document.getElementById('nutri_' + macro + '_target');
      if (document.activeElement !== targetInput) targetInput.value = targets[macro];
      const pct = targets[macro] > 0 ? Math.min(100, (totals[macro] / targets[macro]) * 100) : 0;
      document.getElementById('nutri_' + macro + '_bar').style.width = pct + '%';
    });
  }
  function renderMealList() {
    const dateStr = getActiveDate();
    const meals = getMeals(dateStr);
    const listEl = document.getElementById('mealList');
    const emptyEl = document.getElementById('nutriEmpty');
    if (!meals.length) {
      listEl.innerHTML = '';
      emptyEl.style.display = 'block';
      return;
    }
    emptyEl.style.display = 'none';
    listEl.innerHTML = meals.map((m, i) => (
      '<div class="nutri-meal-row">'
      + '<div class="nutri-meal-name">' + escapeHtmlNutri(m.name || 'Meal') + '</div>'
      + '<div class="nutri-meal-macros">' + (m.calories || 0) + ' cal · ' + (m.protein || 0) + 'p ' + (m.carbs || 0) + 'c ' + (m.fat || 0) + 'f</div>'
      + '<button type="button" class="nutri-meal-del" data-i="' + i + '" aria-label="Delete">×</button>'
      + '</div>'
    )).join('');
    listEl.querySelectorAll('.nutri-meal-del').forEach((btn) => {
      btn.addEventListener('click', () => {
        const arr = getMeals(dateStr);
        arr.splice(parseInt(btn.dataset.i, 10), 1);
        setMeals(dateStr, arr);
        renderNutrition();
      });
    });
  }
  function renderNutrition() {
    renderNutriTotals();
    renderMealList();
  }

  document.getElementById('mealAddBtn').addEventListener('click', () => {
    const name = document.getElementById('mealName').value.trim();
    const calories = parseFloat(document.getElementById('mealCalories').value) || 0;
    const protein  = parseFloat(document.getElementById('mealProtein').value) || 0;
    const carbs    = parseFloat(document.getElementById('mealCarbs').value) || 0;
    const fat      = parseFloat(document.getElementById('mealFat').value) || 0;
    if (!name && !calories && !protein && !carbs && !fat) return;
    const dateStr = getActiveDate();
    const arr = getMeals(dateStr);
    arr.push({ name: name || 'Meal', calories, protein, carbs, fat });
    setMeals(dateStr, arr);
    document.getElementById('mealName').value = '';
    document.getElementById('mealCalories').value = '';
    document.getElementById('mealProtein').value = '';
    document.getElementById('mealCarbs').value = '';
    document.getElementById('mealFat').value = '';
    renderNutrition();
  });

  NUTRI_MACROS.forEach((macro) => {
    document.getElementById('nutri_' + macro + '_target').addEventListener('change', (e) => {
      const targets = getNutriTargets();
      targets[macro] = parseFloat(e.target.value) || NUTRI_DEFAULT_TARGETS[macro];
      setNutriTargets(targets);
      renderNutriTotals();
    });
  });

  renderNutrition();

  window.addEventListener('storage', () => {
    render();
    renderSleep();
    renderNutrition();
  });
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'health',
    syncedKeys: ['po_water_v1', 'sleep_streak_v1', 'nutrition_targets_v1'],
    syncedPrefixes: ['stack:taken:', 'sleep:', 'nutrition:'],
    onApplied: function () { window.dispatchEvent(new Event('storage')); }
  });
});
</script>

</body>
